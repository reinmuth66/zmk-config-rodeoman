manifest:
  defaults:
    revision: v0.3
  remotes:
    - name: zmkfirmware
      url-base: https://github.com/zmkfirmware
    - name: Reinmuth66
      url-base: https://github.com/Reinmuth66
    - name: kzyz
      url-base: https://github.com/kzyz
  projects:
    - name: zmk
      remote: zmkfirmware
      import: app/west.yml
      path: zmk
    - name: zmk_az1uball_driver
      remote: kzyz
      revision: main
      path: modules/zmk_az1uball_driver
    - name: zmk-rgbled-widget
      url: https://github.com/caksoylar/zmk-rgbled-widget
      revision: v0.3
      path: modules/zmk-rgbled-widget
  self:
    path: config
